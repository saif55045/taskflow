# MongoDB Deployment — Single replica with persistent storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  labels:
    app: taskflow
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow
      tier: database
  template:
    metadata:
      labels:
        app: taskflow
        tier: database
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
