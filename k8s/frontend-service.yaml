# Frontend Service — NodePort to expose externally
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: taskflow
    tier: frontend
spec:
  type: NodePort
  selector:
    app: taskflow
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
