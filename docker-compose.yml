# ─── Docker Compose ───
# Runs all three services: frontend, backend, and MongoDB

version: "3.8"

services:
  # ─── Frontend (React + Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow-network
    restart: unless-stopped

  # ─── Backend (Node.js + Express) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskmanager
    depends_on:
      - mongo
    networks:
      - taskflow-network
    restart: unless-stopped

  # ─── Database (MongoDB) ───
  mongo:
    image: mongo:7.0
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskflow-network
    restart: unless-stopped

# ─── Volumes ───
volumes:
  mongo-data:
    driver: local

# ─── Networks ───
networks:
  taskflow-network:
    driver: bridge
